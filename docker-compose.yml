name: forge-ai

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      FORGE_AI_ENVIRONMENT: production
      FORGE_AI_LOG_LEVEL: INFO
      FORGE_AI_NEO4J_DATABASE: neo4j
      FORGE_AI_NEO4J_PASSWORD: forge-ai-dev
      FORGE_AI_NEO4J_URI: bolt://neo4j:7687
      FORGE_AI_NEO4J_USERNAME: neo4j
    ports:
      - '8000:8000'
    volumes:
      - repository-data:/app/data/repositories
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/forge-ai-dev
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u neo4j -p forge-ai-dev "RETURN 1" >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      FORGE_AI_ENVIRONMENT: production
      FORGE_AI_LOG_LEVEL: INFO
      FORGE_AI_WORKER_PORT: '8001'
    ports:
      - '8001:8001'
    volumes:
      - repository-data:/app/data/repositories
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  neo4j-data:
  repository-data:
  redis-data:
